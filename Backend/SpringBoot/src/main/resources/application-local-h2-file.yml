spring:
  liquibase:
    enabled: false
  application:
    name: fullstack-backend

  datasource:
    url: jdbc:h2:file:./Backend/SpringBoot/myh2db
    driver-class-name: org.h2.Driver
    # username: admin
    # password: admin

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
